{% extends 'manager/base_manager.html' %}

{% block page_title %}
Register Scheme Customer
{% endblock %}

{% block content %}

<div class="form-container">

    <div class="form-header">
        <h2>Register Scheme Customer</h2>
        <p>
            Enroll a customer into the NYONDO deposit scheme.
        </p>
    </div>

    <form method="POST" class="main-form">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="submit-btn">
            Register Customer
        </button>

    </form>

</div>

<style>

.form-container{
    max-width:850px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:var(--shadow);
}

.form-header{
    margin-bottom:25px;
}

.form-header h2{
    margin-bottom:10px;
    color:#0f172a;
}

.form-header p{
    color:#64748b;
}

.main-form p{
    margin-bottom:18px;
}

.main-form label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#334155;
}

.main-form input,
.main-form select,
.main-form textarea{
    width:100%;
    padding:14px;
    border:1px solid #cbd5e1;
    border-radius:12px;
}

.submit-btn{
    margin-top:20px;
    background:linear-gradient(135deg,#0f172a,#1abc9c);
    color:white;
    border:none;
    padding:14px 20px;
    border-radius:12px;
    cursor:pointer;
    font-weight:700;
}

</style>

{% endblock %}
