{% extends 'base.html' %}

{% block content %}

<div class="container">

    <h2>Record Supplier Payment</h2>

    <a href="{% url 'supplier_credit_dashboard' %}" class="btn btn-secondary mb-3">
        Back
    </a>

    <div class="card p-4">

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit"
                    class="btn btn-success">

                Record Payment

            </button>

        </form>

    </div>

</div>

{% endblock %}
