{% extends 'manager/base_manager.html' %} 
{% block page_title %} 
Edit Product 
{% endblock %} 

{% block content %}

<div class="form-container">
  <h1>Edit Product</h1>
<div class="card">
  <form method="POST" class="form-grid">
    {% csrf_token %} {{ form.as_p }}

    <button type="submit" class="submit-btn btn btn-primary">Update Product</button>
    <div class="page-top">
      <a href="javascript:history.back()" class="back-btn">
        <i class="ph ph-arrow-left"></i>

        Back
      </a>
    </div>
  </form>
  </div>
</div>
<style>
  .card{

    background:white;

    border-radius:18px;

    padding:30px;

    box-shadow:0 4px 10px rgba(0,0,0,0.05);

  }
  /* .form-card{

    width:100%;

    max-width:800px;

 */

  
  .form-grid{

    display:grid;

    grid-template-columns:repeat(2, 1fr);

    gap:18px;
    max-width: 800px;
    max-height: 120vh;

  }
  

</style>
{% endblock %}
