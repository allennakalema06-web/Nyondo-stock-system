{% extends 'manager/base_manager.html' %}

{% block page_title %}
Delete Category
{% endblock %}

{% block content %}

<div class="delete-card">

    <div class="delete-icon">

        <i class="ph ph-warning-circle"></i>

    </div>

    <h2>Delete Category?</h2>

    <p>

        You are about to permanently delete

        <strong>
            {{ category.category_name }}
        </strong>

    </p>

    <form method="POST">

        {% csrf_token %}

        <div class="delete-actions">

            <a href="{% url 'category_list' %}"
               class="btn btn-secondary">

                Cancel

            </a>

            <button class="btn btn-danger">

                <i class="ph ph-trash"></i>

                Delete

            </button>

        </div>

    </form>

</div>

<style>

.delete-card{

    max-width:500px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;

}

.delete-icon{

    width:80px;
    height:80px;
    margin:auto;
    border-radius:50%;
    background:#fee2e2;
    color:#dc2626;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:40px;

    margin-bottom:20px;

}

.delete-actions{

    display:flex;
    justify-content:center;
    gap:16px;
    margin-top:30px;

}

</style>

{% endblock %}
