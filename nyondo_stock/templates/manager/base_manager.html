<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Nyondo Stock</title>

    <!-- FONT AWESOME -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <!-- PHOSPHOR ICONS -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
      :root {
        --sidebar-gradient: linear-gradient(235deg, #0b1f3a, #1abc9c);

        --body-bg: #f8fafc;

        --card-bg: #ffffff;

        --text-dark: #1e293b;

        --text-muted: #64748b;

        --border-color: #e2e8f0;

        --shadow:
          0 10px 25px rgba(20, 184, 166, 0.14),
          0 4px 18px rgba(16, 185, 129, 0.12),
          0 0 0 1px rgba(45, 212, 191, 0.08);

        --radius: 18px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        background: var(--body-bg);
        overflow-x: hidden;
      }

      .layout {
        display: flex;
        min-height: 100vh;
      }

      /* SIDEBAR */

      .sidebar {
        width: 260px;

        background: var(--sidebar-gradient);

        color: white;

        padding: 24px;

        display: flex;

        flex-direction: column;
        height: 100vh;
        position: sticky;
        left: 0;
        top: 0;
        overflow-y: auto;
        flex-shrink: 0;
      }

      .nav-item.active {
        background: rgba(255, 255, 255, 0.12);
        color: white;
        border-left: 4px solid #4ade80;
      }

      .logo-section {
        display: flex;

        align-items: center;

        gap: 15px;

        margin-bottom: 40px;
      }

      .logo-icon {
        width: 50px;

        height: 50px;

        border-radius: 14px;

        background: rgba(255, 255, 255, 0.1);

        display: flex;

        align-items: center;

        justify-content: center;

        font-size: 24px;
      }

      .logo-section h2 {
        font-size: 20px;
      }

      .logo-section p {
        font-size: 11px;

        opacity: 0.7;

        letter-spacing: 1px;
      }

      .nav-menu {
        flex-grow: 1;
      }

      .nav-item {
        display: flex;

        align-items: center;

        gap: 14px;

        text-decoration: none;

        color: white;

        padding: 14px 16px;

        border-radius: 12px;

        margin-bottom: 10px;

        transition: 0.3s;
      }

      .nav-item:hover {
        background: rgba(255, 255, 255, 0.1);
        border: #e5faf5 solid 1px;
      }

      .sidebar-footer {
        display: flex;

        align-items: center;

        gap: 8px;

        padding-top: 20px;

        border-top: 1px solid #ffffff1a;
      }

      .back-btn {
        display: inline-flex;

        align-items: center;

        gap: 8px;

        padding: 10px 18px;

        border-radius: 10px;

        text-decoration: none;

        background: white;

        color: #0b1f3a;

        font-weight: 600;

        box-shadow:
          0 10px 30px rgba(16, 185, 129, 0.08),
          0 4px 12px rgba(13, 77, 77, 0.06);

        margin-bottom: 20px;
      }

      .avatar {
        width: 45px;

        height: 45px;

        border-radius: 50%;

        background: #4ade80;

        color: #064e3b;

        display: flex;

        align-items: center;

        justify-content: center;

        font-weight: bold;
      }

      .user-details {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 4px;

        flex-direction: row;
      }

      .user-details span {
        font-size: 12px;

        opacity: 0.7;
      }

      .logout-btn {
        display: flex;

        align-items: center;

        gap: 10px;

        padding: 14px 16px;

        border-radius: 12px;

        text-decoration: none;

        color: white;

        margin-top: 20px;

        background: rgba(255, 255, 255, 0.08);

        transition: 0.3s;
      }

      .logout-btn:hover {
        background: rgba(239, 68, 68, 0.2);
      }

      /* MAIN */

      .messages-wrapper {
        margin-bottom: 20px;
      }

      .alert-message {
        display: flex;

        align-items: center;

        gap: 12px;

        padding: 16px 18px;

        border-radius: 14px;

        margin-bottom: 12px;

        font-weight: 500;

        animation: fadeIn 0.4s ease;
      }

      .alert-message.success {
        background: #dcfce7;

        color: #166534;
      }

      .alert-message.error {
        background: #fee2e2;

        color: #991b1b;
      }

      .alert-message.info {
        background: #dbeafe;

        color: #1e40af;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;

          transform: translateY(-10px);
        }

        to {
          opacity: 1;

          transform: translateY(0);
        }
      }
      .main {
        min-height: 100vh;
        flex: 1;

        overflow-x: hidden;

        min-width: 0;

        padding: 32px;
      }

      .topbar {
        display: flex;

        justify-content: space-between;

        align-items: center;

        margin-bottom: 30px;
      }

      .page-title {
        font-size: 30px;

        color: var(--text-dark);
      }

      .page-subtitle {
        color: var(--text-muted);

        margin-top: 5px;
      }

      .topbar-actions {
        display: flex;

        gap: 10px;
      }

      .topbar-btn {
        width: 45px;

        height: 45px;

        border: none;

        border-radius: 12px;

        background: white;

        box-shadow:
          0 10px 30px rgba(16, 185, 129, 0.08),
          0 4px 12px rgba(13, 77, 77, 0.06);

        cursor: pointer;

        font-size: 18px;
      }

      /* CARDS */

      .card {
        background: var(--card-bg);

        border-radius: var(--radius);

        padding: 24px;

        box-shadow: var(--shadow);

        transition: 0.3s ease;
        box-shadow:
          0 10px 30px rgba(16, 185, 129, 0.08),
          0 4px 12px rgba(13, 77, 77, 0.06);
      }

      .card:hover {
        transform: translateY(-3px);
      }
      .card,
      .stat-card,
      table,
      .form-control,
      input,
      select,
      textarea {
        box-shadow: var(--shadow);
      }

      /* TABLES */

      table {
        width: 100%;

        border-collapse: collapse;
      }

      table th {
        text-align: left;

        padding: 14px;

        color: var(--text-muted);

        font-size: 13px;

        border-bottom: 1px solid var(--border-color);
      }

      table td {
        padding: 16px 14px;

        border-bottom: 1px solid var(--border-color);
      }

      .empty-state {
        text-align: center;

        padding: 40px;

        color: #94a3b8;
      }

      .empty-state i {
        font-size: 42px;

        margin-bottom: 12px;
      }

      .search-box {
        position: relative;

        width: 320px;
        overflow-x: auto;
        margin-bottom: 20px;
      }

      .search-box input {
        width: 100%;

        padding: 14px 18px 14px 45px;

        border: none;

        border-radius: 14px;

        background: #f1f5f9;

        outline: none;
      }

      .search-box i {
        position: absolute;

        left: 15px;

        top: 15px;

        color: #64748b;
      }
      .table-responsive {
        overflow-x: auto;
      }

      tbody tr {
        transition: 0.2s;
      }

      tbody tr:hover {
        background: #f8fafc;
      }

      /* BUTTONS */

      .btn {
        border: none;

        padding: 12px 18px;
        margin: 10px;

        border-radius: 10px;

        cursor: pointer;

        text-decoration: none;

        display: inline-flex;
        justify-content: center;

        align-items: center;

        gap: 8px;
      }

      .btn-primary {
        background: linear-gradient(235deg, #0b1f3a, #1abc9c);

        color: white;
      }

      .btn-danger {
        background: #ef4444;

        color: white;
      }

      .btn-warning {
        background: #f59e0b;

        color: white;
      }

      /* FORMS */

      .form-control {
        width: 100%;

        padding: 12px;

        border-radius: 10px;

        border: 1px solid var(--border-color);

        margin-top: 6px;

        margin-bottom: 16px;
      }

      input,
      select,
      textarea {
        width: 100%;

        padding: 14px 16px;

        border: 1px solid #e2e8f0;

        border-radius: 12px;

        background: #fff;

        transition: 0.3s;
      }

      input:hover,
      select:hover,
      textarea:hover {
        border-color: #1abc9c;

        box-shadow:
          0 10px 30px rgba(16, 185, 129, 0.08),
          0 4px 12px rgba(13, 77, 77, 0.06);

        outline: none;
      }
      .table-responsive {
        width: 100%;

        overflow-x: auto;
      }
      .messages-wrapper {
        position: fixed;

        top: 20px;

        right: 20px;

        z-index: 9999;

        display: flex;

        flex-direction: column;

        gap: 12px;
      }

      .alert-message {
        min-width: 320px;

        max-width: 420px;

        padding: 16px 18px;

        border-radius: 16px;

        display: flex;

        align-items: center;

        justify-content: space-between;

        gap: 14px;

        color: white;

        font-weight: 600;

        box-shadow:
          0 10px 30px rgba(16, 185, 129, 0.15),
          0 4px 12px rgba(13, 77, 77, 0.1);

        animation: slideIn 0.4s ease;

        backdrop-filter: blur(10px);
      }

      .alert-message.success {
        background: linear-gradient(235deg, #059669, #14b8a6);
      }

      .alert-message.error {
        background: linear-gradient(235deg, #dc2626, #ef4444);
      }

      .alert-message.warning {
        background: linear-gradient(235deg, #d97706, #f59e0b);
      }

      .alert-message.info {
        background: linear-gradient(235deg, #2563eb, #06b6d4);
      }

      .close-message {
        background: none;

        border: none;

        color: white;

        cursor: pointer;

        font-size: 18px;

        display: flex;

        align-items: center;

        justify-content: center;
      }

      @keyframes slideIn {
        from {
          opacity: 0;

          transform: translateX(40px);
        }

        to {
          opacity: 1;

          transform: translateX(0);
        }
      }
    </style>
    <script>
      const messages = document.querySelectorAll(".alert-message");

      messages.forEach(function (message) {
        const closeBtn = message.querySelector(".close-message");

        closeBtn.addEventListener("click", function () {
          message.remove();
        });

        setTimeout(function () {
          message.style.opacity = "0";

          message.style.transform = "translateX(40px)";

          setTimeout(function () {
            message.remove();
          }, 400);
        }, 3000);
      });
    </script>
  </head>

  <body>
    <div class="layout">
      {% include 'manager/partials/sidebar.html' %}

      <main class="main">
        {% if messages %}

        <div class="messages-wrapper">
          {% for message in messages %}

          <div class="alert-message {{ message.tags }}">
            <i class="ph ph-check-circle"></i>

            <span>{{ message }}</span>

            <button class="close-message">
              <i class="ph ph-x"></i>
            </button>
          </div>

          {% endfor %}
        </div>

        {% endif %} {% block content %} {% endblock %}
      </main>
    </div>
  </body>
</html>
