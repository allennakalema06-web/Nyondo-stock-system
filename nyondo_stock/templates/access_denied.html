<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Access Denied</title>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>

        body{

            margin:0;

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:#f8fafc;

            font-family:Inter,sans-serif;

        }

        .card{

            background:white;

            padding:50px;

            border-radius:24px;

            text-align:center;

            box-shadow:0 10px 30px rgba(0,0,0,0.08);

            max-width:450px;

        }

        .icon{

            width:90px;

            height:90px;

            margin:auto;

            border-radius:50%;

            background:#fee2e2;

            display:flex;

            justify-content:center;

            align-items:center;

            font-size:42px;

            color:#dc2626;

            margin-bottom:25px;

        }

        h1{

            margin-bottom:12px;

            color:#0f172a;

        }

        p{

            color:#64748b;

            line-height:1.7;

        }

        .btn{

            display:inline-block;

            margin-top:25px;

            padding:14px 24px;

            background:linear-gradient(
                235deg,
                #0B1F3A,
                #1ABC9C
            );

            color:white;

            text-decoration:none;

            border-radius:12px;

            font-weight:600;

        }

    </style>

</head>

<body>

    <div class="card">

        <div class="icon">

            <i class="ph ph-lock"></i>

        </div>

        <h1>Access Restricted</h1>

        <p>

            You do not have permission
            to access this section of the system.

        </p>

        <a href="/" class="btn btn-primary">

            Return Dashboard

        </a>

    </div>

</body>

</html>
